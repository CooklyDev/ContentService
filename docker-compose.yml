services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-content_service}
      POSTGRES_USER: ${POSTGRES_USER:-content_service}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-content_service}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-content_service} -d ${POSTGRES_DB:-content_service}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  migrations:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-content_service}:${POSTGRES_PASSWORD:-content_service}@postgres:5432/${POSTGRES_DB:-content_service}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  content-service:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-content_service}:${POSTGRES_PASSWORD:-content_service}@postgres:5432/${POSTGRES_DB:-content_service}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    ports:
      - '${APP_PORT:-3000}:3000'

volumes:
  postgres_data:
